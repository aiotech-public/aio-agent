services:
  aio-agent:
    container_name: aio-agent
    image: prodaiotech/agentgo:38777ed8
    deploy:
      restart_policy:
        condition: unless-stopped
    pull_policy: always
    env_file:
      - ./.aio-env
    environment:
      - LISTEN_TLS_PORT=:7201
      - LISTEN_PORT=:7200
      - METRICS_PORT=:6200
    stop_grace_period: 0.5s
    volumes:
      - /opt/go-cache:/go/cache
      - /opt/go-sessions:/go/sessions
    ulimits:
      core:
        soft: -1
        hard: -1
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "1000m"
    profiles: [main]

  aio-agent-spare:
    container_name: aio-agent-spare
    image: prodaiotech/agentgo:38777ed8
    deploy:
      restart_policy:
        condition: unless-stopped
    pull_policy: always
    env_file:
      - ./.aio-env
    environment:
      - LISTEN_PORT=:7300
      - LISTEN_TLS_PORT:=7301
    stop_grace_period: 0.5s
    volumes:
      - /opt/go-cache:/go/cache
      - /opt/go-sessions:/go/sessions
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "1000m"
    profiles: [spare-agent]

  proxy-nginx:
    container_name: proxy-nginx
    image: prodaiotech/nginx:48abfba2
    entrypoint:
    - "nginx"
    - "-g"
    - "daemon off;"
    ports:
    - "80:80"
    - "443:443"
    #node-exporter
    - "9100:9100"
    #agent-go
    - "9200:9200"
    #nginx-vts
    - "9300:9300"
    stop_grace_period: 1s
    volumes:
    - "./volumes/nginx/conf.d:/etc/nginx/conf.d:ro"
    - "./volumes/nginx/stream.d:/etc/nginx/stream.d:ro"
    - "./volumes/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"
    - "./volumes/certs/nginx-origin:/opt/letsencrypt:ro"
    - "./volumes/certs/metrics/server.crt:/opt/metrics-server.crt:ro"
    - "./volumes/certs/metrics/server.key:/opt/metrics-server.key:ro"
    - "./volumes/certs/metrics/ca.crt:/opt/metrics-ca.crt:ro"
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "2000m"
    profiles: [main]

  nginx-vts-exporter:
    container_name: nginx-vts-exporter
    image: sophos/nginx-vts-exporter:latest
    stop_grace_period: 1s
    environment:
      - NGINX_STATUS=http://proxy-nginx:2000/format/json
    profiles: [main]

  proxy:
    image: prodaiotech/agent-squid:21829790
    restart: unless-stopped
    ports:
      - "5145:5145"
    environment:
      - TZ=UTC
    env_file:
      - ./.aio-env
    stop_grace_period: 0.5s
    profiles: [main]

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - '/proc:/host/proc:ro'
      - '/sys:/host/sys:ro'
      - '/:/host/rootfs:ro,rslave'
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.disable-defaults'
      - '--collector.cpu'
      - '--collector.cpufreq'
      - '--collector.diskstats'
      - '--collector.filesystem'
      - '--collector.pressure'
      - '--collector.meminfo'
      - '--collector.netdev'
    profiles: [main]
