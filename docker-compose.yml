services:
  aio-agent:
    container_name: aio-agent
    image: prodaiotech/agentgo:971344d7
    pull_policy: missing
    restart: unless-stopped
    env_file:
      - ./.aio-env
    environment:
      LISTEN_TLS_PORT: ":7201"
      LISTEN_PORT: ":7200"
      METRICS_PORT: ":6200"
    stop_grace_period: 0.5s
    volumes:
      - /opt/go-cache:/go/cache
      - /opt/go-sessions:/go/sessions
    ulimits:
      core:
        soft: -1
        hard: -1
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 1000m
    healthcheck:
      test:
        - CMD-SHELL
        - if command -v curl >/dev/null 2>&1; then curl -fsS http://127.0.0.1:7200/ping >/dev/null; elif command -v wget >/dev/null 2>&1; then wget -q -O- http://127.0.0.1:7200/ping >/dev/null; else exit 1; fi
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    profiles: [main]

  aio-agent-spare:
    container_name: aio-agent-spare
    image: prodaiotech/agentgo:971344d7
    pull_policy: missing
    restart: unless-stopped
    env_file:
      - ./.aio-env
    environment:
      LISTEN_PORT: ":7300"
      LISTEN_TLS_PORT: ":7301"
    stop_grace_period: 0.5s
    volumes:
      - /opt/go-cache:/go/cache
      - /opt/go-sessions:/go/sessions
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 1000m
    healthcheck:
      test:
        - CMD-SHELL
        - if command -v curl >/dev/null 2>&1; then curl -fsS http://127.0.0.1:7300/ping >/dev/null; elif command -v wget >/dev/null 2>&1; then wget -q -O- http://127.0.0.1:7300/ping >/dev/null; else exit 1; fi
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    profiles: [spare-agent]

  proxy-nginx:
    container_name: proxy-nginx
    image: prodaiotech/nginx:48abfba2
    entrypoint:
      - nginx
      - -g
      - daemon off;
    restart: unless-stopped
    depends_on:
      aio-agent:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "9200:9200"
      - "9300:9300"
    stop_grace_period: 1s
    volumes:
      - ./volumes/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./volumes/nginx/stream.d:/etc/nginx/stream.d:ro
      - ./volumes/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./volumes/nginx/letsencrypt:/opt/letsencrypt:ro
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 2000m
    healthcheck:
      test:
        - CMD-SHELL
        - nginx -t >/dev/null 2>&1 && test -s /var/run/nginx.pid
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    profiles: [main]

  nginx-vts-exporter:
    container_name: nginx-vts-exporter
    image: sophos/nginx-vts-exporter:latest
    restart: unless-stopped
    depends_on:
      proxy-nginx:
        condition: service_healthy
    stop_grace_period: 1s
    environment:
      NGINX_STATUS: http://proxy-nginx:2000/format/json
    profiles: [main]

  proxy:
    image: prodaiotech/agent-squid:21829790
    restart: unless-stopped
    ports:
      - "5145:5145"
    environment:
      TZ: UTC
    env_file:
      - ./.aio-env
    stop_grace_period: 0.5s
    profiles: [main]

  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
      - ./volumes/exporter:/tls-keys:ro
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.disable-defaults
      - --collector.cpu
      - --collector.cpufreq
      - --collector.diskstats
      - --collector.filesystem
      - --collector.pressure
      - --collector.meminfo
      - --collector.netdev
      - --web.config.file=/tls-keys/exporter_conf.yml
    profiles: [main]
